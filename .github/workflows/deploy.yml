name: Deploy to Hostinger VPS

# Deploys the Docker stack (app + Caddy) to a Hostinger VPS on every push to main.
# Secrets/keys live in GitHub (Settings -> Secrets and variables -> Actions),
# never in the repository. The action injects them into the deployment as
# environment variables, which compose.yaml picks up via ${VAR} interpolation.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Deploy to Hostinger VPS
        uses: hostinger/deploy-on-vps@v2
        with:
          api-key: ${{ secrets.HOSTINGER_API_KEY }}
          virtual-machine: ${{ vars.HOSTINGER_VM_ID }}
          project-name: units-gen
          docker-compose-path: compose.yaml
          # KEY=value, one per line. Pulled from GitHub Secrets/Variables.
          environment-variables: |
            FAL_KEY=${{ secrets.FAL_KEY }}
            FAL_MODEL=fal-ai/nano-banana-2/edit
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            OPENAI_MODEL=gpt-5-mini
            DOMAIN=${{ vars.DOMAIN }}
            BASIC_AUTH_USER=${{ vars.BASIC_AUTH_USER }}
            BASIC_AUTH_HASH=${{ secrets.BASIC_AUTH_HASH }}
