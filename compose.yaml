# Standalone Docker deploy: app only (Node + Remotion).
# Put HTTPS / Basic Auth in front via Coolify, nginx, or another reverse proxy.

services:
  app:
    build: .
    environment:
      FAL_KEY: ${FAL_KEY:-}
      FAL_MODEL: ${FAL_MODEL:-fal-ai/nano-banana-2/edit}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
    ports:
      - "8082:8082"
    volumes:
      # Persist generated images/videos across rebuilds.
      - ./_generated:/app/_generated
    restart: unless-stopped
